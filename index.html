    <!--
      WHY: Splash screen renderuje się w pierwszej klatce (przed pobraniem JS),
      więc musi mieć CSS inline w head — zewnętrzny CSS z chunka React by się
      załadował za późno. Splash znika po hydratacji (klasa app-ready na <html>
      dodawana w AppLayout.useEffect). Spójny ze Splash.css ( dokumentacja),
      ale ten inline jest źródłem prawdy dla first-paint.
    -->
    <style>
      #app-splash{position:fixed;inset:0;z-index:99999;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0e0f11;color:#f8fafc;font-family:"Outfit","Segoe UI",system-ui,-apple-system,sans-serif;opacity:1;transition:opacity .4s ease-out;padding:2rem;text-align:center;-webkit-text-size-adjust:100%}
      html.app-ready #app-splash{opacity:0;pointer-events:none;visibility:hidden}
      .app-splash-logo-wrapper{width:7rem;height:7rem;border-radius:1.5rem;background:linear-gradient(135deg,#15171c 0%,#0e0f11 100%);border:1px solid rgba(245,158,11,.2);display:inline-flex;align-items:center;justify-content:center;box-shadow:0 12px 32px -8px rgba(0,0,0,.6),0 0 0 1px rgba(245,158,11,.05) inset;margin-bottom:1.75rem}
      .app-splash-logo-wrapper img{width:4.5rem;height:4.5rem;display:block}
      .app-splash-title{font-size:clamp(1.75rem,6vw,2.25rem);font-weight:700;letter-spacing:-.02em;margin:0 0 .5rem 0;line-height:1.1;color:#f8fafc}
      .app-splash-title-accent{color:#f59e0b}
      .app-splash-subtitle{font-size:clamp(.625rem,2.5vw,.75rem);font-weight:500;letter-spacing:.18em;color:#6c7280;text-transform:uppercase;margin:0 0 3rem 0}
      .app-splash-progress{position:absolute;bottom:4rem;left:50%;transform:translateX(-50%);width:min(14rem,60vw);height:.25rem;background:rgba(245,158,11,.12);border-radius:999px;overflow:hidden}
      .app-splash-progress-bar{position:absolute;top:0;left:0;height:100%;width:35%;background:linear-gradient(90deg,transparent 0%,#f59e0b 50%,transparent 100%);border-radius:999px;animation:app-splash-progress-scan 1.4s ease-in-out infinite}
      @keyframes app-splash-progress-scan{0%{transform:translateX(-100%)}100%{transform:translateX(380%)}}
      @media (prefers-reduced-motion:reduce){.app-splash-progress-bar{animation:none;background:#f59e0b;width:100%;opacity:.4}}
      @media (max-width:480px){.app-splash-logo-wrapper{width:5.5rem;height:5.5rem;border-radius:1.25rem;margin-bottom:1.5rem}.app-splash-logo-wrapper img{width:3.5rem;height:3.5rem}.app-splash-subtitle{margin-bottom:2.5rem}.app-splash-progress{bottom:3rem}}
      @media (min-width:768px) and (max-width:1024px){.app-splash-logo-wrapper{width:8rem;height:8rem}.app-splash-logo-wrapper img{width:5rem;height:5rem}}
    </style>
  </head>

  <body>
    <!--
      WHY: Splash screen pokazywany w pierwszej klatce, przed hydratacją React.
      CSS inline w <head> gwarantuje poprawny wygląd natychmiast. Klasa app-ready
      na <html> (dodawana w src/App.tsx -> AppLayout.useEffect) uruchamia
      transition opacity -> 0 i ukrywa splash. Używamy <img src="/dinboard.svg">
      bo to czysty wektor (świetna jakość na każdym ekranie, mniejszy niż PNG).
    -->
    <div id="app-splash" role="status" aria-label="DINBoard — ładowanie aplikacji">
      <div class="app-splash-logo-wrapper">
        <img src="/dinboard.svg" alt="" />
      </div>
      <h1 class="app-splash-title">
        DIN<span class="app-splash-title-accent">Board</span>
      </h1>
      <p class="app-splash-subtitle">Aplikacja dla elektryków</p>
      <div class="app-splash-progress" aria-hidden="true">
        <div class="app-splash-progress-bar"></div>
      </div>
    </div>
    <script>
      // WHY: Eliminacja FOUC (Flash Of Unstyled Content) na mobile.
      // AppHeader renderuje warunkowo hamburger vs menu tekstowe na podstawie
      // hooka `useIsMobileLayout`, którego initial state to `false` (SSR-safe).
      // Bez tego skryptu na telefonie przez ~50ms widać pełne desktopowe menu
      // zanim React wykryje viewport i przełączy layout. Ustawiamy klasę
      // `is-mobile-viewport` na <html> PRZED hydration, a CSS w Responsive.css
      // używa jej do pokazywania/ukrywania elementów mobile/desktop od razu,
      // bez czekania na JavaScript.
      //
      // Boundary 768px musi być zsynchronizowana z `MOBILE_MAX_WIDTH_PX`
      // w src/hooks/useViewport.ts oraz z media queries w Responsive.css.
      (function () {
        try {
          if (
            typeof window.matchMedia === "function" &&
            window.matchMedia("(max-width: 768px)").matches
          ) {
            document.documentElement.classList.add("is-mobile-viewport");
          }
        } catch (_error) {
          // matchMedia nie jest dostępne (np. bardzo stara przeglądarka)
          // → nie robimy nic, aplikacja pozostanie w desktop layout.
        }
      })();
    </script>
    <script>
      // WHY: Eliminacja flasha ciemnego motywu po odświeżeniu strony.
      // vite-react-ssg renderuje HTML z hardcoded `ui-theme-modern` (bo
      // localStorage jest pusty podczas builda). useState(() => loadUiTheme())
      // w AppWorkspace powinien to nadpisać, ale podczas hydration React
      // trzyma SSG value jeśli nie ma wyraźnego sygnału. Efekt: użytkownik
      // z ustawionym jasnym motywem po odświeżeniu widzi ciemną stronę.
      // Fix: ustawiamy klasę motywu na <html> PRZED hydration — CSS
      // (html.ui-theme-classic w AppLayout.css itd.) reaguje natychmiast.
      // AppWorkspace nadal czyta localStorage przez lazy initializer
      // i nadpisuje klasę na <main> — oba mechanizmy są spójne.
      (function () {
        try {
          var saved = window.localStorage.getItem("dinboard.ui_theme");
          if (saved === "classic" || saved === "modern") {
            document.documentElement.classList.add("ui-theme-" + saved);
          }
        } catch (_error) {
          // localStorage nie jest dostępny (np. private mode) → nie robimy nic,
          // aplikacja zostanie w domyślnym ciemnym motywie.
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
