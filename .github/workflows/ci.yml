name: ci

on:
  push:
    branches:
      - main
      - master
  pull_request:

# Dwa joby:
# - test: szybki feedback (build + unit testy). Musi przejść żeby PR mógł być zmergowany.
# - smoke: wolniejszy, testuje czy zbudowana apka w ogóle startuje (predeploy). Można
#   pominąć przez label `skip-smoke` na PR.
jobs:
  test:
    name: Build & test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          # Jedno źródło prawdy dla wersji Node: .nvmrc (obecnie 24.12.0),
          # spójne z package.json engines.node (24.x). Nie hardkodować wersji tutaj.
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        # Zero-warning gate: lint zwraca 0 ostrzeżeń (od 2026-07), więc
        # blokujemy nowy dług. Kiedyś było ~35 warningów, obniżone do 0.
        # Każdy nowy warning = fail builda. To zamknięcie Kroku 1 planu
        # z docs/code-review-and-improvement-plan.md.
        run: npm run lint -- --max-warnings 0

      - name: Build
        run: npm run build

      - name: Bundle size budget
        # Faili, jeśli JS (gzip) przekroczy budżet w scripts/check-bundle-size.mjs.
        # Cel: apka nie rośnie niepostrzeżenie (istotne na telefonie).
        run: npm run size

      - name: Unit tests
        run: npm run test

  smoke:
    name: Pre-deploy smoke
    runs-on: ubuntu-latest
    needs: test
    # Smoke startuję zbudowaną apkę i sprawdza czy kluczowe routy odpowiadają.
    # Wymaga działającego serwera (predeploy), więc jest wolniejszy i bardziej
    # wrażliwy na network. Domyślnie włączony; do pominięcia na PR dodaj label
    # `skip-smoke` (GitHub: gh pr edit --add-label skip-smoke).
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'skip-smoke') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run smoke against local build
        run: npm run smoke:online
        env:
          DINBOARD_SMOKE_PORT: "4173"

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: test
    # E2E testuje zbudowany artefakt przez realnego Chromium. Wolniejsze niż
    # unit testy, wymaga pobrania przeglądarki. Do pominięcia na PR dodaj label
    # `skip-e2e` (analogicznie do `skip-smoke`): gh pr edit --add-label skip-e2e.
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'skip-e2e') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers (chromium only)
        # chromium-only — patrz komentarz w playwright.config.ts. Najmniejszy
        # footprint, wystarcza do PWA smoke.
        run: npx playwright install --with-deps chromium

      - name: Build
        # preview (webServer w playwright.config.ts) wymaga zbudowanego dist/.
        run: npm run build

      - name: Run E2E
        run: npm run test:e2e
        env:
          CI: "true"

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
